<!-- Preconnect to GA endpoints · saves ~100ms first-load handshake -->
<link rel="preconnect" href="https://www.googletagmanager.com" crossorigin>
<link rel="preconnect" href="https://www.google-analytics.com" crossorigin>

<!-- Google Consent Mode v2 · defaults to denied · GDPR + UK PECR compliant -->
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('consent', 'default', {
    'ad_storage':         'denied',
    'ad_user_data':       'denied',
    'ad_personalization': 'denied',
    'analytics_storage':  'denied',
    'functionality_storage': 'denied',
    'personalization_storage': 'denied',
    'security_storage':   'granted',
    'wait_for_update':    500
  });
  // Honour Global Privacy Control + Do-Not-Track before any tag fires.
  if (navigator.globalPrivacyControl === true ||
      navigator.doNotTrack === '1' || navigator.doNotTrack === 'yes' ||
      window.doNotTrack === '1' || navigator.msDoNotTrack === '1') {
    gtag('consent', 'update', {
      'ad_storage':         'denied',
      'ad_user_data':       'denied',
      'ad_personalization': 'denied',
      'analytics_storage':  'denied'
    });
  }
</script>
