name: Deploy to production

# Triggered by:
#   · push to main (excluding doc-only changes)
#   · manual workflow_dispatch (lets you redeploy without a commit)
#
# Concurrency cancels stale runs so a fast follow-up push wins.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   SSH_PRIVATE_KEY   · the ed25519 private key for deploy@46.225.133.203
#                       (paste the full contents of ~/.ssh/id_ed25519_counsel_day,
#                       including BEGIN/END markers)
#   SSH_HOST          · 46.225.133.203
#   SSH_USER          · deploy
#   SSH_KNOWN_HOSTS   · output of: ssh-keyscan -t ed25519 46.225.133.203
#
# Optional:
#   SLACK_WEBHOOK_URL · post deploy results to Slack (omit to skip)

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - '.gitignore'
  workflow_dispatch:

# Workflow-level concurrency is INTENTIONALLY removed. The two jobs
# below (deploy-app + deploy-static) own their own concurrency groups
# so a stuck app deploy can't block a static deploy (which is what
# 2026-06-06 04:54 hit · PR #2's app deploy waited 7h on environment
# approval, blocking every subsequent merge's static deploy behind the
# shared deploy-production lock).

permissions:
  contents: read

jobs:
  deploy-app:
    name: Deploy counsel-day-app (Next.js)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # App deploys queue strictly · never cancel a build that may be
    # half-way through restarting systemd. Per-job concurrency overrides
    # any workflow-level group.
    concurrency:
      group: deploy-app-production
      cancel-in-progress: false
    # Gated behind a GitHub Environment with manual approval. The
    # approval queue is what blocks app deploys when no reviewer is
    # around · static deploys are now independent of this.
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Need enough history for `git diff $before..$sha` in the detect
          # step. fetch-depth: 1 made the diff fail silently (the before
          # SHA wasn't reachable), which made `changed=false` and skipped
          # the deploy. 50 is plenty for any normal push.
          fetch-depth: 50

      - name: Detect changes in counsel-day-app
        id: detect
        run: |
          set -e
          # Fetch enough history to diff. On first push / shallow clone the
          # `before` SHA may not exist locally, so we fall back to changed=true
          # rather than silently skipping the deploy (which is what was
          # happening before · 2026-05-19 incident).
          if [ -z "${{ github.event.before }}" ] || [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            echo "Empty before SHA · marking changed=true"
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            if ! git cat-file -e "${{ github.event.before }}^{commit}" 2>/dev/null; then
              echo "Before SHA ${{ github.event.before }} not in local history · fetching"
              git fetch --depth=20 origin "${{ github.event.before }}" 2>&1 || true
            fi
            if git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" 2>/dev/null | grep -qE '^counsel-day-app/'; then
              echo "counsel-day-app/ files changed in this push · marking changed=true"
              echo "changed=true" >> $GITHUB_OUTPUT
            else
              # Either the diff was empty (no app changes) OR the diff failed
              # because the before SHA isn't reachable. Default to true on
              # failure · false-positive deploy is cheaper than false-negative.
              if git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" 2>/dev/null > /dev/null; then
                echo "No counsel-day-app/ changes · marking changed=false"
                echo "changed=false" >> $GITHUB_OUTPUT
              else
                echo "Diff failed (before SHA unreachable) · defaulting to changed=true"
                echo "changed=true" >> $GITHUB_OUTPUT
              fi
            fi
          fi

      - name: Set up Node
        if: steps.detect.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/setup-node@v4
        with:
          node-version: '20.20.2'

      - name: Pre-flight typecheck
        if: steps.detect.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        working-directory: counsel-day-app
        run: |
          npm install --no-audit --no-fund
          npx tsc --noEmit

      - name: Configure SSH
        if: steps.detect.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          echo "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy app
        if: steps.detect.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        # Step-level timeout · job timeout is 15 min, but the SSH chain
        # was hanging for 7+ hours on a previous run because the step
        # never returned. Step timeout forces failure within 10 minutes
        # of step start so a stuck deploy fails fast and the job runner
        # is freed for the next merge.
        timeout-minutes: 10
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          # rsync (with --delete) is the right tool here · tar over SSH
          # ADDS and UPDATES files but never REMOVES files deleted in the
          # source tree. That left orphan route files on the server
          # (e.g. teams-waitlist/route.ts after the Teams scope-out)
          # which then broke `next build` with "import error · X is not
          # exported from @/lib/schema". --delete fixes this cleanly.
          # Excludes preserve node_modules, .next build cache, secrets,
          # git data, and the runtime .git-rev sha file.
          cd counsel-day-app
          # ConnectTimeout caps the initial SSH handshake; ServerAlive
          # detects a dropped connection mid-command. Without these, a
          # network blip can hang the run for the full job timeout.
          export ANSIBLE_SSH_ARGS=""
          SSH_OPTS="-o ConnectTimeout=15 -o ServerAliveInterval=30 -o ServerAliveCountMax=3 -i ~/.ssh/id_ed25519"
          ssh $SSH_OPTS "$SSH_USER@$SSH_HOST" "sudo mkdir -p /opt/counsel-day-app && sudo chown -R deploy:deploy /opt/counsel-day-app"
          rsync -e "ssh $SSH_OPTS" -az --delete \
            --exclude='node_modules' --exclude='.next' \
            --exclude='.env' --exclude='.env.local' \
            --exclude='.git' --exclude='.git-rev' \
            ./ "$SSH_USER@$SSH_HOST:/opt/counsel-day-app/"
          ssh $SSH_OPTS "$SSH_USER@$SSH_HOST" "
            set -e
            cd /opt/counsel-day-app
            # Record the deployed git sha so /api/health (lib/version.ts)
            # reports what is actually running. Written in TWO places:
            #   · /opt/counsel-day-app/.git-rev (fallback path)
            #   · /opt/counsel-day-app/.next/standalone/.git-rev (the path
            #     the running Next.js standalone server actually reads,
            #     because process.cwd() is the standalone dir at runtime)
            # The standalone one is written AFTER npm run build because
            # .next/standalone/ is regenerated by each build.
            echo '${{ github.sha }}' | cut -c1-7 > /opt/counsel-day-app/.git-rev
            if [ ! -f package-lock.json ] || [ package.json -nt package-lock.json ]; then
              rm -f package-lock.json
              npm install
            else
              npm ci
            fi
            set -a; source /etc/counsel-day-app/env.local; set +a
            npm run build
            echo '${{ github.sha }}' | cut -c1-7 > /opt/counsel-day-app/.next/standalone/.git-rev
            npm run db:migrate
            sudo systemctl daemon-reload
            sudo systemctl restart counsel-day-app
            sleep 2
            sudo systemctl is-active counsel-day-app
          "

      - name: Health check
        if: steps.detect.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          sleep 3
          curl -sSf https://counsel.day/api/health | grep -q '"ok":true'

  deploy-static:
    name: Deploy counsel-day-complete (static site)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Static deploys auto-cancel any in-flight static run on the same
    # ref · the latest commit's HTML is always what we want on the box.
    # Independent of the app deploy's strict-queue concurrency group.
    concurrency:
      group: deploy-static-production
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Need enough history for `git diff $before..$sha` in the detect
          # step. fetch-depth: 1 made the diff fail silently (the before
          # SHA wasn't reachable), which made `changed=false` and skipped
          # the deploy. 50 is plenty for any normal push.
          fetch-depth: 50

      - name: Detect changes in counsel-day-complete
        id: detect
        run: |
          set -e
          # Same defensive logic as the app job · falls back to changed=true
          # when the diff can't be computed (e.g. shallow clone, unreachable
          # before SHA) rather than silently skipping the deploy.
          if [ -z "${{ github.event.before }}" ] || [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            if ! git cat-file -e "${{ github.event.before }}^{commit}" 2>/dev/null; then
              git fetch --depth=20 origin "${{ github.event.before }}" 2>&1 || true
            fi
            if git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" 2>/dev/null | grep -qE '^counsel-day-complete/'; then
              echo "changed=true" >> $GITHUB_OUTPUT
            elif git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" 2>/dev/null > /dev/null; then
              echo "changed=false" >> $GITHUB_OUTPUT
            else
              echo "changed=true" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Brand verify
        if: steps.detect.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        shell: pwsh
        run: |
          pwsh ./counsel-day-complete/scripts/brand-verify.ps1

      # H1 · Hash long-cached JS assets so we can ship with immutable
      # Cache-Control: max-age=31536000 without ever serving stale code.
      # Replaces /nav-toggle.js with /nav-toggle.<hash>.js (and similar
      # for helper-widget.js, ga4.js, pwa.js) in every HTML reference,
      # and ships the hashed copies alongside the originals. Browsers
      # automatically refetch when the filename changes. Idempotent.
      - name: Hash assets for cache-busting
        if: steps.detect.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        run: python3 ./counsel-day-complete/scripts/hash-assets.py

      - name: Configure SSH
        if: steps.detect.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          echo "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Push static
        if: steps.detect.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        # Step-level timeout · static deploy completes in ~20s on a
        # healthy network. 5 min is generous; a stuck SSH connection
        # fails fast and the runner is freed for the next merge.
        timeout-minutes: 5
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          SSH_OPTS="-o ConnectTimeout=15 -o ServerAliveInterval=30 -o ServerAliveCountMax=3 -i ~/.ssh/id_ed25519"
          tar -czf - -C counsel-day-complete \
            --exclude='scripts' --exclude='engineering' --exclude='ops' . \
            | ssh $SSH_OPTS "$SSH_USER@$SSH_HOST" \
              'sudo tar -xzf - -C /var/www/counsel.day && sudo chown deploy:deploy /var/www/counsel.day/sitemap.xml || true'

      - name: Regenerate sitemap
        if: steps.detect.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        timeout-minutes: 3
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          ssh -o ConnectTimeout=15 -o ServerAliveInterval=30 -i ~/.ssh/id_ed25519 \
            "$SSH_USER@$SSH_HOST" 'sudo systemctl start counsel-day-sitemap.service'

      # Sync Caddyfile + reload Caddy if it changed. The repo's
      # counsel-day-complete/ops/Caddyfile is the source of truth;
      # the live config at /etc/caddy/Caddyfile gets overwritten,
      # validated, and reloaded. Caddy's reload is graceful · the
      # process keeps serving the old config until the new one is
      # validated, so a syntax error doesn't take the site down.
      #
      # Requires passwordless sudo for the deploy user on:
      #   cp /tmp/Caddyfile.new /etc/caddy/Caddyfile
      #   caddy validate --config /etc/caddy/Caddyfile
      #   systemctl reload caddy
      # (One-time sudoers edit.)
      - name: Sync Caddyfile + reload
        if: steps.detect.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          scp -i ~/.ssh/id_ed25519 counsel-day-complete/ops/Caddyfile "$SSH_USER@$SSH_HOST:/tmp/Caddyfile.new"
          ssh -i ~/.ssh/id_ed25519 "$SSH_USER@$SSH_HOST" '
            set -e
            # Only reload if there is a real change; saves Caddy from
            # an unnecessary graceful-reload on every static deploy.
            if sudo cmp -s /tmp/Caddyfile.new /etc/caddy/Caddyfile; then
              echo "Caddyfile unchanged · no reload"
              rm -f /tmp/Caddyfile.new
              exit 0
            fi
            echo "Caddyfile changed · validating + reloading"
            sudo caddy validate --config /tmp/Caddyfile.new --adapter caddyfile
            sudo cp /tmp/Caddyfile.new /etc/caddy/Caddyfile
            sudo systemctl reload caddy
            rm -f /tmp/Caddyfile.new
            echo "Caddy reloaded OK"
          '
