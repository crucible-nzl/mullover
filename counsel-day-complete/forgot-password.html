<style>
.pwr-grid { max-width: 460px; margin: 24px auto; padding: 0 24px; }
.pwr-card { border: 1px solid var(--ink); background: var(--paper); padding: 28px 30px; }
.pwr-card .eyebrow { font-family: var(--font-mono); font-size: 13px; font-weight: 600; letter-spacing: 0.16em; text-transform: uppercase; color: var(--wine); margin-bottom: 10px; }
.pwr-card h1 { font-family: var(--font-display); font-weight: 400; font-size: clamp(26px, 3vw, 32px); line-height: 1.1; letter-spacing: -0.018em; color: var(--ink); margin: 0 0 14px; }
.pwr-card h1 .ital { font-style: italic; color: var(--wine); }
.pwr-card p.lede { font-family: var(--font-body); font-size: 15px; line-height: 1.55; color: var(--ink-soft); margin: 0 0 22px; }
.pwr-field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
.pwr-field label { font-family: var(--font-mono); font-size: 12px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink); }
.pwr-field input { font-family: var(--font-body); font-size: 16px; padding: 11px 12px; border: 1px solid var(--ink); background: var(--paper); color: var(--ink); border-radius: 0; width: 100%; }
.pwr-field input:focus { outline: none; border-color: var(--wine); box-shadow: 0 0 0 2px var(--wine-soft); }
.pwr-submit { margin-top: 18px; }
.pwr-msg { padding: 14px 16px; margin-bottom: 16px; display: none; font-family: var(--font-body); font-size: 14px; line-height: 1.5; }
.pwr-msg.is-shown { display: block; }
.pwr-msg.is-success { background: var(--wine-soft); border-left: 3px solid var(--wine); color: var(--ink); }
.pwr-msg.is-error { background: #fdecea; border-left: 3px solid #c0392b; color: #6b1e16; }
</style>

<main id="main-content">
  <div class="pwr-grid">
    <div id="msg" class="pwr-msg" role="alert" aria-live="polite"></div>
    <section class="pwr-card">
      <div class="eyebrow">§ Forgot password</div>
      <h1>Reset your <span class="ital">password.</span></h1>
      <p class="lede">Enter the email on your account. We will send a one-time link valid for 30 minutes.</p>
      <form id="form" method="post" action="/api/password-reset/request" novalidate>
        <div class="pwr-field">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required autocomplete="email" inputmode="email">
        </div>
        <div class="pwr-submit">
          <button type="submit" class="btn btn-large">Send reset link</button>
        </div>
      </form>
    </section>
  </div>
</main>
<footer class="colophon">
  <div class="colophon-inner">
    <div class="colophon-bottom">
      <div>© 2026 Counsel.day · USD pricing worldwide</div>
    </div>
  </div>
</footer>
<script>
(function () {
  var form = document.getElementById('form');
  var msg = document.getElementById('msg');
  function show(kind, text) { msg.className = 'pwr-msg is-shown is-' + kind; msg.textContent = text; }
  form.addEventListener('submit', function (e) {
    e.preventDefault();
    var btn = form.querySelector('button[type="submit"]');
    btn.disabled = true; btn.textContent = 'Sending' + String.fromCharCode(0x2026);
    fetch(form.action, { method: 'POST', body: new FormData(form), credentials: 'include' })
      .then(function (r) { return r.json().then(function (j) { return { status: r.status, body: j }; }); })
      .then(function (res) {
        if (res.status === 200) {
          show('success', res.body.message || 'If that email is on file, a reset link is on its way.');
          form.reset();
        } else {
          show('error', (res.body && res.body.message) || 'Could not send the reset link. Please try again.');
        }
      })
      .catch(function () { show('error', 'Network error. Please try again.'); })
      .finally(function () { btn.disabled = false; btn.textContent = 'Send reset link'; });
  });
})();
</script>
